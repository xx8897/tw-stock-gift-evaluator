name: 自動增量更新股價資料 (FinMind)

on:
  schedule:
    # 台灣時間平日 18:00-22:00（UTC 10-14），每小時一次
    # 每次更新最舊的 200 支，5 次可覆蓋 1000 筆
    - cron: '0 10,11,12,13,14 * * 1-5'
  workflow_dispatch:  # 保留手動觸發供測試

permissions:
  contents: read  # 只需讀取，不需 push

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        # update_prices_finmind.py 和 valuation.py 不依賴 pandas
        run: pip install requests python-dotenv

      - name: 執行 FinMind 增量股價更新
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/core/update_prices_finmind.py
