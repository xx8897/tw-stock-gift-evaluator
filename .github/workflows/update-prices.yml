name: 自動更新股價資料

on:
  schedule:
    # 🔵 旺季（3月～6月）：每週四 UTC 20:00 = 台灣週五 04:00 (抓週四收盤價，趕在週五開盤前)
    # 不過週一更新前一週的其實更合理，為維持之前協議：
    # 台灣時間 每週一 中午 12:00 = UTC 04:00
    - cron: '0 4 * 3-6 1'
    # 🟣 淡季（7月～2月）：每月第一個週一 UTC 04:00 = 台灣中午 12:00
    # 注意：cron 不直接支援「每月第一個週一」，所以我們設定每個月的 1-7 號，再透過腳本判斷是否為週一。
    # 或更簡單的：淡季也固定每週跑，反正免費。但為了符合需求，我們設定每個月初跑一次（1號）。
    - cron: '0 4 1 7-12,1-2 *' 
  # 🟣 可在 Actions 頁面手動觸發（測試用）
  workflow_dispatch:

permissions:
  contents: write  # 需要寫入權限才能 push 更新的 xlsx

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 取得程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 依賴套件
        run: pip install pandas requests openpyxl

      - name: 執行股價更新腳本
        run: python evaluate_stocks.py

      - name: Commit 並 Push 更新後的資料
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/2021-2025_推薦評分.xlsx data/2021-2025_年年發放.xlsx
          git commit -m "auto: 每週股價更新 $(date -u '+%Y-%m-%d')" || echo "No price changes, skipping commit."
          git push
