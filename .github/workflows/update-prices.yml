name: 自動更新股價資料

on:
  schedule:
    # 每週一、三、五 台灣時間 18:00（UTC 10:00）收盤後更新股價
    - cron: '0 10 * * 1,3,5'
  # 可在 Actions 頁面手動觸發（測試用）
  workflow_dispatch:

permissions:
  contents: write  # 需要寫入權限才能 push 更新的 xlsx

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 取得程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: pip install pandas requests openpyxl

      - name: 執行 Supabase 專用股價更新腳本
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/evaluate_stocks_supa.py
