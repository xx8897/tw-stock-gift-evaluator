<!-- Login Options Modal -->
<div id="loginModal" class="modal-overlay hidden">
    <div class="login-modal-wrapper">
        <button class="close-btn external-close-btn" id="closeLoginModalBtn"><i class="fa-solid fa-xmark"></i></button>
        <div class="modal-content login-modal-card">

            <div class="login-header">
                <h2>台股股東會紀念品指南</h2>
                <p>登入以同步您的專屬投資清單</p>
            </div>

            <!-- Tabs -->
            <div class="login-tabs">
                <button class="login-tab active" data-tab="signin" tabindex="1">登入</button>
                <button class="login-tab" data-tab="signup" tabindex="2">註冊</button>
            </div>

            <div class="login-body">
                <!-- Standard Auth Form (Login/Signup) -->
                <form id="authForm" class="auth-form stagger-anim">
                    <div id="authErrorMsg" class="auth-error-msg hidden"></div>

                    <!-- Honeypot field for bot protection -->
                    <div style="position: absolute; left: -9999px;">
                        <label for="website_b_firstname">Firstname</label>
                        <input type="text" id="website_b_firstname" name="b_firstname" class="honeypot-field"
                            tabindex="-1" autocomplete="off">
                    </div>

                    <div class="form-group signup-only hidden">
                        <label for="authNickname"><i class="fa-regular fa-user"></i> 暱稱 (選填)</label>
                        <div class="input-with-counter">
                            <input type="text" id="authNickname" placeholder="設定您的專屬稱呼" maxlength="20"
                                autocomplete="off" tabindex="3">
                            <span class="char-counter" id="nicknameCounter">0/20</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="authEmail"><i class="fa-regular fa-envelope"></i> Email</label>
                        <input type="email" id="authEmail" name="email" placeholder="investor@example.com" required
                            autocomplete="username" tabindex="4">
                    </div>

                    <div class="form-group password-group">
                        <label for="authPassword"><i class="fa-solid fa-lock"></i> 密碼 <span id="capsLockWarning"
                                class="caps-warning hidden"><i class="fa-solid fa-a"></i> 大寫鎖定中</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="authPassword" name="password" placeholder="••••••••" required
                                minlength="6" autocomplete="current-password" tabindex="5">
                            <button type="button" class="toggle-password-btn" id="togglePasswordBtn" tabindex="-1">
                                <i class="fa-regular fa-eye-slash"></i>
                            </button>
                        </div>
                        <div id="passwordStrength" class="password-strength hidden">
                            <div class="strength-bar"></div>
                        </div>
                        <div id="passwordHintText" class="password-hint-text hidden">密碼長度至少需 6 碼</div>
                    </div>

                    <div class="form-options login-only">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" checked tabindex="6"> 保持登入
                        </label>
                        <a href="#" id="forgotPasswordLink" class="text-link" tabindex="7">忘記密碼？</a>
                    </div>

                    <div class="form-options signup-only hidden">
                        <label class="checkbox-label">
                            <input type="checkbox" id="tosAgree" required tabindex="6"> 我同意服務條款與隱私權政策
                        </label>
                    </div>

                    <button type="submit" class="auth-submit-btn" id="authSubmitBtn" tabindex="8">
                        <span class="btn-text">登入</span>
                        <div class="btn-spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i> <span
                                class="loading-text">載入中...</span></div>
                        <div class="btn-success hidden"><i class="fa-solid fa-check"></i></div>
                    </button>
                </form>

                <!-- OTP Verification Form (Hidden by default) -->
                <form id="otpForm" class="auth-form hidden stagger-anim">
                    <div class="otp-instruction">
                        <i class="fa-solid fa-envelope-open-text"
                            style="color: #34d399; font-size: 2rem; margin-bottom: 0.5rem;"></i>
                        <p style="color: #fff; font-weight: 600; margin-bottom: 0.2rem;">驗證碼已寄出！</p>
                        <p style="color: var(--text-secondary); font-size: 0.85rem;" id="otpEmailMasked">請前往信箱查看 6
                            位數驗證碼
                        </p>
                    </div>

                    <div id="otpErrorMsg" class="auth-error-msg hidden"></div>

                    <div class="form-group">
                        <label for="otpInput" class="visually-hidden">驗證碼</label>
                        <input type="text" id="otpInput" class="otp-input" placeholder="請輸入 6 位數驗證碼" required
                            pattern="\d{6}" maxlength="6" autocomplete="one-time-code" tabindex="1">
                    </div>

                    <button type="button" class="auth-submit-btn" id="otpSubmitBtn" tabindex="2">
                        <span class="btn-text">驗證並登入</span>
                        <div class="btn-spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i> <span
                                class="loading-text">驗證中...</span></div>
                        <div class="btn-success hidden"><i class="fa-solid fa-check"></i></div>
                    </button>
                    <button type="button" class="text-link-btn" id="resendOtpBtn"
                        style="margin-top: 0.5rem; width: 100%;" tabindex="3">重新發送驗證碼</button>
                    <button type="button" class="text-link-btn" id="backToSignupBtn"
                        style="margin-top: 1rem; width: 100%;" tabindex="4">← 返回重填</button>
                </form>

                <!-- Forgot Password / Reset Password Form -->
                <form id="forgotPasswordForm" class="auth-form hidden stagger-anim">
                    <div class="otp-instruction">
                        <i class="fa-solid fa-key" style="color: #60a5fa; font-size: 2rem; margin-bottom: 0.5rem;"></i>
                        <p style="color: #fff; font-weight: 600; margin-bottom: 0.2rem;">重置密碼</p>
                        <p style="color: var(--text-secondary); font-size: 0.85rem;">輸入您的 Email，我們會發送重置連結給您。</p>
                    </div>

                    <div id="forgotPasswordMsg" class="auth-error-msg hidden"></div>
                    <div id="forgotPasswordSuccessMsg" class="auth-success-msg hidden">✅ 重置連結已發送！請檢查您的 Email 信箱。
                    </div>

                    <div class="form-group">
                        <label for="resetEmail"><i class="fa-regular fa-envelope"></i> Email</label>
                        <input type="email" id="resetEmail" name="resetEmail" placeholder="user@example.com" required
                            autocomplete="username" tabindex="1">
                    </div>

                    <button type="submit" class="auth-submit-btn" id="forgotPasswordSubmitBtn" tabindex="2">
                        <span class="btn-text">發送重置連結</span>
                        <div class="btn-spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i> <span
                                class="loading-text">處理中...</span></div>
                        <div class="btn-success hidden"><i class="fa-solid fa-check"></i></div>
                    </button>
                    <button type="button" class="text-link-btn" id="backToLoginFromForgotBtn"
                        style="margin-top: 1rem; width: 100%;" tabindex="3">← 返回登入</button>
                </form>

                <!-- Recovery OTP Verification Form (Hidden by default) -->
                <form id="recoverOtpForm" class="auth-form hidden stagger-anim">
                    <div class="otp-instruction">
                        <i class="fa-solid fa-envelope-circle-check"
                            style="color: #60a5fa; font-size: 2rem; margin-bottom: 0.5rem;"></i>
                        <p style="color: #fff; font-weight: 600; margin-bottom: 0.2rem;">驗證碼已寄出！</p>
                        <p style="color: var(--text-secondary); font-size: 0.85rem;" id="recoverOtpEmailMasked">
                            請前往信箱查看 6
                            位數密碼重置驗證碼
                        </p>
                    </div>

                    <div id="recoverOtpMsg" class="auth-error-msg hidden"></div>

                    <div class="form-group">
                        <label for="recoverOtpInput" class="visually-hidden">密碼重置驗證碼</label>
                        <input type="text" id="recoverOtpInput" class="otp-input" placeholder="請輸入 6 位數驗證碼" required
                            pattern="\d{6}" maxlength="6" autocomplete="one-time-code" tabindex="1">
                    </div>

                    <button type="button" class="auth-submit-btn" id="recoverOtpSubmitBtn" tabindex="2">
                        <span class="btn-text">驗證驗證碼</span>
                        <div class="btn-spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i> <span
                                class="loading-text">驗證中...</span></div>
                        <div class="btn-success hidden"><i class="fa-solid fa-check"></i></div>
                    </button>
                    <button type="button" class="text-link-btn" id="resendRecoverOtpBtn"
                        style="margin-top: 0.5rem; width: 100%;" tabindex="3">重新發送驗證碼</button>
                    <button type="button" class="text-link-btn" id="backToForgotFromRecoverBtn"
                        style="margin-top: 1rem; width: 100%;" tabindex="4">← 返回重填 Email</button>
                </form>

                <!-- Set New Password Form (Deep link) -->
                <form id="updatePasswordForm" class="auth-form hidden stagger-anim">
                    <div class="otp-instruction">
                        <i class="fa-solid fa-unlock-keyhole"
                            style="color: #34d399; font-size: 2rem; margin-bottom: 0.5rem;"></i>
                        <p style="color: #fff; font-weight: 600; margin-bottom: 0.2rem;">設定新密碼</p>
                        <p style="color: var(--text-secondary); font-size: 0.85rem;">請輸入您的新密碼以完成重置。</p>
                    </div>

                    <div id="updatePasswordMsg" class="auth-error-msg hidden"></div>

                    <div class="form-group password-group">
                        <label for="newPassword"><i class="fa-solid fa-lock"></i> 新密碼</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required
                                minlength="6" autocomplete="new-password" tabindex="1">
                        </div>
                    </div>

                    <div class="form-group password-group">
                        <label for="confirmNewPassword"><i class="fa-solid fa-lock"></i> 確認新密碼</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="confirmNewPassword" name="confirmNewPassword"
                                placeholder="••••••••" required minlength="6" autocomplete="new-password" tabindex="2">
                        </div>
                    </div>

                    <button type="submit" class="auth-submit-btn" id="updatePasswordSubmitBtn" tabindex="3">
                        <span class="btn-text">更新密碼並登入</span>
                        <div class="btn-spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i> <span
                                class="loading-text">處理中...</span></div>
                        <div class="btn-success hidden"><i class="fa-solid fa-check"></i></div>
                    </button>
                </form>

                <div class="login-divider" id="socialDivider">
                    <span>或</span>
                </div>

                <!-- Alternative Methods -->
                <div class="alt-login-methods" id="altLoginMethods">
                    <button class="social-login-btn google-btn" onclick="signInWithGoogle()" tabindex="9">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                        <span>使用 Google 登入</span>
                    </button>

                    <button class="guest-login-btn" id="guestLoginBtn" tabindex="10">
                        <i class="fa-solid fa-person-walking-luggage" style="color: #34d399;"></i>
                        <span>以訪客身份繼續</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Data Sync Conflict Modal -->
<div id="syncConflictModal" class="modal-overlay hidden">
    <div class="modal-content login-modal-card sync-conflict-card">
        <div class="login-header sync-conflict-header">
            <i class="fa-solid fa-code-compare"></i>
            <h2>發現雲端資料</h2>
            <p>您剛才以訪客模式勾選了一些股票，但在雲端中我們找到了您之前的紀錄。您希望如何處理？</p>
        </div>
        <div class="modal-body sync-conflict-options">
            <button class="auth-submit-btn sync-conflict-btn merge" id="btnMergeData">
                <div class="sync-conflict-btn-title">
                    <i class="fa-solid fa-object-group"></i> 合併兩者 (推薦)
                </div>
                <small>保留雲端與剛才點選的所有項目</small>
            </button>
            <button class="auth-submit-btn sync-conflict-btn overwrite" id="btnOverwriteCloud">
                <div class="sync-conflict-btn-title">
                    <i class="fa-solid fa-cloud-arrow-down"></i> 完全以雲端為準
                </div>
                <small>捨棄剛剛點選的，恢復雲端清單</small>
            </button>
        </div>
    </div>
</div>
