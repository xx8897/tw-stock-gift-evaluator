name: 自動更新股價資料

on:
  schedule:
    # 每週一、三、五 台灣時間 18:00（UTC 10:00）收盤後更新股價
    - cron: '0 10 * * 1,3,5'
  # 可在 Actions 頁面手動觸發（測試用）
  workflow_dispatch:

permissions:
  contents: write  # 需要寫入權限才能 push 更新的 xlsx

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 取得程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: pip install pandas requests openpyxl

      - name: 1. 執行 OpenAPI 股價抓取 (精準更新)
        run: python scripts/update_prices_v2.py

      - name: 2. 執行評量模型計算 (計算 CP 與星級)
        run: python scripts/evaluate_stocks_supa.py

      - name: 3. 執行 Supabase 資料庫同步
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/upload_stocks.py

      - name: 4. 提交並推送更新後的 Excel 檔案
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/2021-2025_推薦v2.xlsx
          git commit -m "chore: 每日自動更新股價與評鑑資料" || echo "No changes to commit"
          git push
