    <!-- 修改暱稱彈窗 -->
    <div class="modal-overlay hidden" id="nicknameModal">
        <div class="modal-content mini-modal-card" style="max-width: 380px;">
            <div class="modal-header">
                <h2><i class="fa-solid fa-user-pen" style="color: #a78bfa; margin-right: 0.5rem;"></i> 修改暱稱</h2>
                <button class="close-btn" onclick="closeNicknameModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 1rem; font-size: 0.9rem;">輸入新的暱稱，最多 20 個字元。</p>
                <label for="nicknameInput" class="visually-hidden">輸入新暱稱</label>
                <input
                    type="text"
                    id="nicknameInput"
                    maxlength="20"
                    placeholder="輸入新暱稱..."
                    autocomplete="off"
                    style="width: 100%; padding: 0.7rem 1rem; border-radius: 10px; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); font-size: 0.95rem; font-family: inherit; box-sizing: border-box; transition: all 0.3s ease; outline: none;"
                    onfocus="this.style.borderColor='#8b5cf6'; this.style.boxShadow='0 0 0 3px rgba(139,92,246,0.2)'"
                    onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.boxShadow='none'"
                >
                <p id="nicknameError" style="color: #f87171; font-size: 0.82rem; margin-top: 0.5rem; display: none;"></p>
            </div>
            <div class="feedback-actions" style="padding: 1.25rem 0 0; margin-top: 0;">
                <button class="feedback-cancel-btn" onclick="closeNicknameModal()">取消</button>
                <button class="feedback-submit-btn" onclick="saveNickname()" id="saveNicknameBtn">
                    <i class="fa-solid fa-check"></i> 儲存
                </button>
            </div>
        </div>
    </div>
