name: Update Stocks Data to Supabase

on:
  push:
    branches:
      - master
    paths:
#      - 'data/2021-2025_推薦評分.xlsx'   # 只有 Excel 有變動時才觸發
      - 'data/2021-2025_推薦v2.xlsx'      # 切換為 v2 監控
  workflow_dispatch:                      # 也可以在 GitHub 上手動觸發

jobs:
  upload:
    name: Upload stocks to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl requests

      - name: Upload stocks data
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/upload_stocks.py
